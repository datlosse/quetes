// XP curve
function xpForNextLevel(n) {
  return Math.round(100 * Math.pow(1.4, n - 1));
}
function computeLevel(totalXP) {
  var level = 1,
    used = 0;
  while (true) {
    var need = xpForNextLevel(level);
    if (used + need > totalXP) break;
    used += need;
    level++;
  }
  return {
    level: level,
    xpIn: totalXP - used,
    xpNeeded: xpForNextLevel(level)
  };
}

function computeDofusPct(dofusId, stats) {
  var d = DOFUS[dofusId];
  if (!d) return 0;
  var p = d.prereqs;
  var total = p.daily + p.weekly + p.monthly + p.quarterly + p.legendary + p.outZC;
  if (!total) return 0;
  var achieved = Math.min(stats.daily || 0, p.daily) + Math.min(stats.weekly || 0, p.weekly) + Math.min(stats.monthly || 0, p.monthly) + Math.min(stats.quarterly || 0, p.quarterly) + Math.min(stats.legendary || 0, p.legendary) + Math.min(stats.outZC || 0, p.outZC);
  return Math.min(100, Math.round(achieved / total * 100));
}
